<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>趣味心理测验中心</title>
  <link rel="stylesheet" href="/styles.css?v=20260415-4" />
  <link rel="stylesheet" href="/css/fun-quiz.css?v=20260415-1" />
  <style>
    :root {
      --color-primary: #8b5cf6;
      --color-secondary: #10b981;
      --color-tertiary: #ec4899;
      --color-fourth: #f59e0b;
      --color-dark: #1f2937;
      --color-light: #f3f4f6;
      --radius: 12px;
    }

    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }

    .fun-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .fun-header {
      text-align: center;
      margin-bottom: 50px;
      color: white;
    }

    .fun-header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
    }

    .fun-header p {
      font-size: 1.1rem;
      opacity: 0.95;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.9);
      text-decoration: none;
      margin-bottom: 30px;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 0.7;
    }

    .quiz-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
    }

    .quiz-card {
      background: white;
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .quiz-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
    }

    .quiz-card-cover {
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
      color: white;
    }

    .quiz-card-body {
      padding: 24px;
    }

    .quiz-card-title {
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--color-dark);
    }

    .quiz-card-subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 12px;
    }

    .quiz-card-meta {
      display: flex;
      gap: 12px;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 16px;
    }

    .quiz-card-meta span {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .quiz-card-btn {
      display: inline-block;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      transition: all 0.2s;
    }

    .quiz-card:hover .quiz-card-btn {
      transform: scale(1.02);
    }

    .loading {
      text-align: center;
      padding: 60px 20px;
      color: white;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 640px) {
      .fun-header h1 {
        font-size: 1.8rem;
      }

      .quiz-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="fun-container">
    <a href="/portal.html" class="back-link">
      <span>&#8592;</span> 返回首页
    </a>

    <div class="fun-header">
      <h1>趣味心理测验中心</h1>
      <p>1~3 分钟，找到你的隐藏人设</p>
    </div>

    <div id="quiz-list" class="quiz-grid">
      <div class="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = '/api';

    async function loadQuizzes() {
      try {
        const response = await fetch(`${API_BASE}/fun-quizzes`);
        if (!response.ok) throw new Error('Failed to load quizzes');
        const quizzes = await response.json();
        renderQuizzes(quizzes);
      } catch (error) {
        document.getElementById('quiz-list').innerHTML = `
          <div class="loading">
            <p>加载失败，请刷新重试</p>
          </div>
        `;
      }
    }

    function renderQuizzes(quizzes) {
      const container = document.getElementById('quiz-list');
      if (quizzes.length === 0) {
        container.innerHTML = '<p style="color:white;text-align:center;">暂无测验</p>';
        return;
      }

      container.innerHTML = quizzes.map(quiz => {
        const themeColor = quiz.theme_color || '#8b5cf6';
        const gradient = themeToGradient(themeColor);

        return `
          <a href="/fun/play.html?quiz=${quiz.slug}" class="quiz-card">
            <div class="quiz-card-cover" style="background: ${gradient}">
              <span style="font-size:4rem">${quiz.emoji || '🎯'}</span>
            </div>
            <div class="quiz-card-body">
              <h3 class="quiz-card-title">${quiz.title}</h3>
              <p class="quiz-card-subtitle">${quiz.subtitle || ''}</p>
              <div class="quiz-card-meta">
                <span>${quiz.question_count}题</span>
                <span>约${quiz.estimated_minutes}分钟</span>
              </div>
              <span class="quiz-card-btn" style="background: ${themeColor}">
                立即测试
              </span>
            </div>
          </a>
        `;
      }).join('');
    }

    function themeToGradient(hex) {
      if (!hex || hex === '#8b5cf6') return 'linear-gradient(135deg, #667eea, #764ba2)';
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      const lighter = `rgb(${Math.min(255,r+30)},${Math.min(255,g+30)},${Math.min(255,b+30)})`;
      const darker = `rgb(${Math.max(0,r-20)},${Math.max(0,g-20)},${Math.max(0,b-20)})`;
      return `linear-gradient(135deg, ${hex}, ${darker})`;
    }

    loadQuizzes();
  </script>
</body>
</html>
