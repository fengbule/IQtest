<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理员后台</title>
  <link rel="stylesheet" href="/iq/styles.css" />
</head>
<body>
  <div class="container narrow">
    <section class="card">
      <h1>管理员后台</h1>
      <p class="subtitle">登录后可查看测评统计与最近成绩。</p>
      <div class="form-grid single">
        <label>
          用户名
          <input id="admin-username" type="text" placeholder="admin" />
        </label>
        <label>
          密码
          <input id="admin-password" type="password" placeholder="请输入密码" />
        </label>
      </div>
      <button id="login-btn" class="button primary">登录</button>
      <p id="login-message" class="notice small"></p>
    </section>

    <section id="dashboard-section" class="card hidden">
      <h2>统计概览</h2>
      <div id="dashboard-metrics" class="score-grid"></div>

      <h3>维度正确率</h3>
      <div id="dashboard-categories" class="dimension-grid"></div>

      <h3>最近测评</h3>
      <div id="recent-results" class="review-list"></div>
    </section>
  </div>
  <script src="/iq/admin.js"></script>
</body>
</html>
